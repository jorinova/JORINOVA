# ══════════════════════════════════════════════════════════════════════════════
# JORINOVA NEXUS ALIS-X — Nginx Production Config
# ══════════════════════════════════════════════════════════════════════════════
# Security: TLS 1.2+, HSTS, rate limiting, buffer limits
# Performance: gzip, keepalive, static file caching
# ══════════════════════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 20M;   # Allow image/document uploads up to 20MB

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/x-javascript text/xml
               application/xml application/xml+rss image/svg+xml;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=login:10m    rate=5r/m;   # 5 logins/min
    limit_req_zone $binary_remote_addr zone=api:10m      rate=60r/m;  # 60 API calls/min
    limit_req_zone $binary_remote_addr zone=general:10m  rate=200r/m; # 200 general/min

    # ── Upstream (FastAPI gunicorn) ───────────────────────────────────────────
    upstream alis_api {
        server api:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Main HTTPS server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name nexus.hospital.rw www.nexus.hospital.rw;

        # ── TLS ──────────────────────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/nexus.hospital.rw/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nexus.hospital.rw/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:SSL:50m;
        ssl_session_tickets off;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # ── Security headers ─────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;
        # Medical system CSP — allows logo, fonts, CDN scripts
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://api.anthropic.com;" always;

        # ── Static files (served directly by Nginx — fast) ───────────────────
        location /static/ {
            alias /usr/share/nginx/html/shared/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
            access_log off;
        }

        location /static/modules/ {
            alias /usr/share/nginx/html/modules/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Media files (uploaded photos, documents) ──────────────────────────
        location /media/ {
            alias /usr/share/nginx/media/;
            expires 1d;
            add_header Cache-Control "private";  # Patient data — no public caching
            # Prevent direct execution of uploaded files
            add_header Content-Disposition "attachment";
        }

        # ── Auth endpoints — strict rate limiting ─────────────────────────────
        location /api/v1/auth/token {
            limit_req zone=login burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://alis_api;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # ── API (JSON) ────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://alis_api;
            include /etc/nginx/conf.d/proxy_params.conf;
            # Larger timeout for AI interpretation calls
            proxy_read_timeout 120s;
        }

        # ── API Docs (restrict to internal network in prod) ──────────────────
        location /api/docs {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://alis_api;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # ── Flower monitoring (restrict to internal) ──────────────────────────
        location /flower/ {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            deny all;
            proxy_pass http://flower:5555/flower/;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # ── All other requests → FastAPI (pages) ─────────────────────────────
        location / {
            limit_req zone=general burst=50 nodelay;
            proxy_pass http://alis_api;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # ── Health check (no rate limit) ──────────────────────────────────────
        location /api/v1/health {
            proxy_pass http://alis_api;
            access_log off;
        }

        # ── Block common attack paths ─────────────────────────────────────────
        location ~ /\.(git|env|htaccess|htpasswd)$ { deny all; return 404; }
        location ~ /(wp-admin|wp-login|phpmyadmin|adminer) { deny all; return 404; }
    }
}
